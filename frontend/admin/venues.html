<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola GOR | JogjaCourt Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#D4AF37' },
                        dark: { DEFAULT: '#0A0A0A', surface: '#151515', border: '#333333' }
                    },
                    fontFamily: { sans: ['Inter','sans-serif'], display: ['Bebas Neue','cursive'] }
                }
            }
        }
    </script>
    <style>
        body { background-color:#0A0A0A; color:white; }
        .form-input { background:rgba(255,255,255,.03); border:1px solid #333; color:white; transition:all .3s; }
        .form-input:focus { border-color:#D4AF37; outline:none; box-shadow: 0 0 8px rgba(212,175,55,.15); }
        select.form-input option { background-color: #111; color: white; }
        th { color:#6b7280; font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; font-weight:700; }
        tr:hover td { background:#1c1c1c; }
    </style>
</head>
<body class="min-h-screen font-sans flex">

    <!-- Sidebar -->
    <aside class="w-64 fixed h-full bg-dark-surface border-r border-dark-border z-40 hidden md:flex flex-col"></aside>

    <main class="flex-1 md:ml-64">
        <header id="adminTopbar" class="h-16 bg-dark border-b border-dark-border sticky top-0 z-30 px-4 md:px-8" style="background:rgba(8,8,8,0.97);backdrop-filter:blur(12px);">
            <div class="hidden md:flex items-center justify-between h-full w-full">
                <div>
                    <h1 class="text-lg font-semibold">Kelola GOR / Venue</h1>
                    <p class="text-xs text-gray-500">Tambah dan kelola data GOR badminton</p>
                </div>
                <div class="flex items-center gap-4">
                    <div id="notifBellWrapDesktop" class="relative">
                        <button class="notif-toggle-btn p-2 rounded-lg hover:bg-white/5 transition-colors relative" onclick="if(typeof Notifications !== 'undefined') Notifications.toggleDropdown(event)">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400 hover:text-white transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                            <span class="notif-badge">0</span>
                        </button>
                    </div>
                    <button onclick="openModal()" class="bg-brand text-black px-5 py-2 rounded font-bold text-sm uppercase tracking-wider hover:bg-white transition-colors flex items-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> Tambah GOR
                    </button>
                </div>
            </div>
        </header>

        <div class="p-6">
            <div id="loadingState" class="flex justify-center py-20"><div class="w-10 h-10 border-4 border-dark-border border-t-brand rounded-full animate-spin"></div></div>
            <div id="emptyState" class="hidden text-center py-20 text-gray-500">
                <i data-lucide="building-2" class="w-16 h-16 mx-auto mb-4 text-gray-700"></i>
                <p>Belum ada GOR. Klik "Tambah GOR" untuk menambahkan.</p>
            </div>
            <div id="tableWrapper" class="hidden overflow-x-auto rounded-xl border border-dark-border">
                <table class="w-full border-collapse">
                    <thead class="border-b border-dark-border"><tr>
                        <th class="px-6 py-4 text-left">Nama GOR</th>
                        <th class="px-6 py-4 text-left">Daerah</th>
                        <th class="px-6 py-4 text-left">Alamat</th>
                        <th class="px-6 py-4 text-left">Telepon</th>
                        <th class="px-6 py-4 text-left">Status</th>
                        <th class="px-6 py-4 text-left">Aksi</th>
                    </tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Tambah GOR -->
    <div id="modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-dark-surface border border-dark-border rounded-xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold font-display tracking-widest">TAMBAH GOR</h2>
                <button onclick="closeModal()"><i data-lucide="x" class="w-5 h-5 text-gray-500 hover:text-white"></i></button>
            </div>
            <div id="formError" class="hidden mb-4 bg-red-900/30 border border-red-500/50 text-red-400 p-3 rounded text-sm"></div>
            <form id="venueForm" class="space-y-4">
                <input type="hidden" id="f_id">
                <div>
                    <label class="block text-xs text-gray-400 mb-1 uppercase tracking-widest">Daerah *</label>
                    <select id="f_area_id" required class="form-input w-full px-3 py-2.5 rounded"><option value="">-- Pilih Daerah --</option></select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 uppercase tracking-widest">Nama GOR *</label>
                    <input type="text" id="f_name" required placeholder="cth: GOR Sritex Arena" class="form-input w-full px-3 py-2.5 rounded">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1 uppercase tracking-widest">Alamat Lengkap *</label>
                    <textarea id="f_address" required rows="2" placeholder="Jl. ..." class="form-input w-full px-3 py-2.5 rounded resize-none"></textarea>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 uppercase tracking-widest">No. Telepon</label>
                        <input type="text" id="f_phone" placeholder="0274-xxxxxx" class="form-input w-full px-3 py-2.5 rounded">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 uppercase tracking-widest">Link Google Maps</label>
                        <input type="url" id="f_maps_url" placeholder="https://maps.google.com/..." class="form-input w-full px-3 py-2.5 rounded">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-xs text-gray-400 mb-1 uppercase tracking-widest">Foto GOR</label>
                    <div class="flex gap-2">
                        <input type="url" id="f_image_url" placeholder="https://..." class="form-input flex-1 px-3 py-2.5 rounded text-sm">
                        <button type="button" onclick="document.getElementById('f_upload').click()" class="bg-dark-surface border border-dark-border text-gray-300 px-4 py-2 rounded text-sm hover:text-brand hover:border-brand transition-colors whitespace-nowrap">
                            <i data-lucide="upload" class="w-4 h-4 inline mr-1"></i> Upload
                        </button>
                    </div>
                    <input type="file" id="f_upload" accept="image/*" class="hidden" onchange="uploadImage(event)">
                    <p id="uploadStatus" class="text-xs text-gray-500 hidden"></p>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="flex-1 border border-dark-border text-gray-400 py-2.5 rounded hover:bg-dark-border text-sm">Batal</button>
                    <button type="submit" id="submitBtn" class="flex-1 bg-brand text-black py-2.5 rounded font-bold text-sm hover:bg-white transition-colors">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script>
        AdminSidebar.init('venues');
        let areasMap = {}; // id -> name lookup

        async function loadAll() {
            try {
                // Ambil venues dan areas bersamaan
                const [venues, areas] = await Promise.all([api.get('/venues'), api.get('/areas')]);

                // Buat lookup map area id → nama area
                areas.forEach(a => { areasMap[a.id] = `${a.name} (${a.province})`; });

                // Isi dropdown area di form
                const sel = document.getElementById('f_area_id');
                areas.forEach(a => {
                    const o = document.createElement('option');
                    o.value = a.id;
                    o.textContent = `${a.name} — ${a.province}`;
                    sel.appendChild(o);
                });

                renderTable(venues);
            } catch (e) {
                showError(e.message);
            }
        }

        function renderTable(venues) {
            document.getElementById('loadingState').classList.add('hidden');
            if (venues.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }
            document.getElementById('tableWrapper').classList.remove('hidden');
            document.getElementById('tableBody').innerHTML = venues.map(v => `
                <tr class="border-b border-dark-border">
                    <td class="px-6 py-4 font-medium text-white">${v.name}</td>
                    <td class="px-6 py-4 text-sm text-gray-400">${areasMap[v.area_id] || v.area_id}</td>
                    <td class="px-6 py-4 text-sm text-gray-500 max-w-xs truncate">${v.address}</td>
                    <td class="px-6 py-4 text-sm text-gray-400">${v.phone || '—'}</td>
                    <td class="px-6 py-4"><span class="${v.is_active ? 'text-brand' : 'text-red-500'} text-xs font-bold uppercase">${v.is_active ? '✓ Aktif' : '✗ Nonaktif'}</span></td>
                    <td class="px-6 py-4 flex gap-2">
                        <button onclick="editVenue('${v.id}', '${v.area_id}', '${v.name.replace(/'/g, "\\'")}', '${v.address.replace(/'/g, "\\'")}', '${(v.phone || '').replace(/'/g, "\\'")}', '${(v.maps_url || '').replace(/'/g, "\\'")}', '${(v.image_url || '').replace(/'/g, "\\'")}')" class="text-xs px-3 py-1 border border-gray-600 text-gray-400 hover:text-white hover:border-white rounded transition-colors">Edit</button>
                        <button onclick="toggleVenue('${v.id}', ${v.is_active})" class="text-xs px-3 py-1 border ${v.is_active ? 'border-red-600 text-red-400 hover:bg-red-900/20' : 'border-brand text-brand hover:bg-brand/10'} rounded transition-colors">
                            ${v.is_active ? 'Nonaktifkan' : 'Aktifkan'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        window.toggleVenue = async function(id, isActive) {
            if (!confirm(`${isActive ? 'Nonaktifkan' : 'Aktifkan'} GOR ini?`)) return;
            try {
                await api.put(`/venues/${id}`, { is_active: !isActive });
                location.reload();
            } catch (e) { showError(e.message); }
        };

        window.editVenue = function(id, area_id, name, address, phone, maps_url, image_url) {
            document.querySelector('#modal h2').textContent = 'EDIT GOR';
            document.getElementById('f_id').value = id;
            document.getElementById('f_area_id').value = area_id;
            document.getElementById('f_name').value = name;
            document.getElementById('f_address').value = address;
            document.getElementById('f_phone').value = phone;
            document.getElementById('f_maps_url').value = maps_url;
            document.getElementById('f_image_url').value = image_url;
            document.getElementById('modal').classList.remove('hidden');
        };

        window.openModal = () => {
            document.querySelector('#modal h2').textContent = 'TAMBAH GOR';
            document.getElementById('f_id').value = '';
            document.getElementById('venueForm').reset();
            document.getElementById('modal').classList.remove('hidden');
        };
        window.closeModal = () => {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('formError').classList.add('hidden');
        };

        function showError(msg) {
            const el = document.getElementById('formError');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        document.getElementById('venueForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Menyimpan...';
            btn.disabled = true;
            document.getElementById('formError').classList.add('hidden');

            // Kirim field 'phone' sesuai nama kolom di model Venue
            const id = document.getElementById('f_id').value;
            const payload = {
                area_id: document.getElementById('f_area_id').value,
                name: document.getElementById('f_name').value,
                address: document.getElementById('f_address').value,
                phone: document.getElementById('f_phone').value || null,
                maps_url: document.getElementById('f_maps_url').value || null,
                image_url: document.getElementById('f_image_url').value || null,
            };
            try {
                if (id) {
                    await api.put(`/venues/${id}`, payload);
                } else {
                    await api.post('/venues', payload);
                }
                closeModal();
                location.reload();
            } catch (e) {
                showError(e.message);
                btn.textContent = 'Simpan';
                btn.disabled = false;
            }
        });

        async function uploadImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const statusEl = document.getElementById('uploadStatus');
            const urlInput = document.getElementById('f_image_url');
            
            statusEl.textContent = 'Mengupload foto...';
            statusEl.className = 'text-xs text-yellow-500 mt-1 block';
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await api.post('/venues/upload-image', formData);
                
                urlInput.value = response.image_url;
                statusEl.textContent = 'Foto berhasil diupload!';
                statusEl.className = 'text-xs text-brand mt-1 block';
            } catch (err) {
                statusEl.textContent = 'Gagal upload: ' + err.message;
                statusEl.className = 'text-xs text-red-500 mt-1 block';
            }
            
            // Reset input file
            e.target.value = '';
        }

        loadAll();
    </script>
</body>
</html>
