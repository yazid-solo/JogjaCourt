<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Booking | ArenaBooking Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#AAFF00' },
                        dark: { DEFAULT: '#0A0A0A', surface: '#151515', border: '#333333' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Bebas Neue', 'cursive'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0A0A0A; color: white; }
        .badge-pending   { background: rgba(234,179,8,.15); color:#eab308; border:1px solid rgba(234,179,8,.3); }
        .badge-confirmed { background: rgba(170,255,0,.1); color:#AAFF00; border:1px solid rgba(170,255,0,.3); }
        .badge-cancelled { background: rgba(239,68,68,.1); color:#ef4444; border:1px solid rgba(239,68,68,.3); }
        .badge-completed { background: rgba(59,130,246,.1); color:#60a5fa; border:1px solid rgba(59,130,246,.3); }
        th { color:#6b7280; font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; font-weight:700; }
        tr:hover td { background:#1c1c1c; }
    </style>
</head>
<body class="min-h-screen font-sans flex">

    <!-- Sidebar -->
    <aside class="w-64 fixed h-full bg-dark-surface border-r border-dark-border z-40 hidden md:flex flex-col">
        <div class="h-20 flex items-center px-6 border-b border-dark-border shrink-0">
            <i data-lucide="activity" class="text-brand w-6 h-6 mr-2"></i>
            <span class="font-display text-xl tracking-wider">ARENA<span class="text-brand">ADMIN</span></span>
        </div>
        <nav class="p-4 space-y-1 flex-grow overflow-y-auto">
            <a href="dashboard.html"  class="flex items-center gap-3 px-4 py-3 rounded hover:bg-dark-border text-gray-400 hover:text-white transition-colors text-sm"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</a>
            <p class="px-4 pt-4 pb-2 text-xs font-bold uppercase tracking-widest text-gray-600">Transaksi</p>
            <a href="bookings.html"   class="flex items-center gap-3 px-4 py-3 rounded bg-brand/10 text-brand font-medium text-sm"><i data-lucide="calendar" class="w-4 h-4"></i> Semua Booking</a>
            <a href="payments.html"   class="flex items-center gap-3 px-4 py-3 rounded hover:bg-dark-border text-gray-400 hover:text-white transition-colors text-sm"><i data-lucide="credit-card" class="w-4 h-4"></i> Verifikasi Bayar</a>
            <a href="court-blocks.html" class="flex items-center gap-3 px-4 py-3 rounded hover:bg-dark-border text-gray-400 hover:text-white transition-colors text-sm"><i data-lucide="shield-off" class="w-4 h-4"></i> Blokir Lapangan</a>
            <p class="px-4 pt-4 pb-2 text-xs font-bold uppercase tracking-widest text-gray-600 superadmin-only">Manajemen</p>
            <a href="courts.html"     class="superadmin-only flex items-center gap-3 px-4 py-3 rounded hover:bg-dark-border text-gray-400 hover:text-white transition-colors text-sm"><i data-lucide="layout-grid" class="w-4 h-4"></i> Lapangan</a>
            <a href="areas.html"      class="superadmin-only flex items-center gap-3 px-4 py-3 rounded hover:bg-dark-border text-gray-400 hover:text-white transition-colors text-sm"><i data-lucide="map" class="w-4 h-4"></i> Daerah</a>
            <a href="venues.html"     class="superadmin-only flex items-center gap-3 px-4 py-3 rounded hover:bg-dark-border text-gray-400 hover:text-white transition-colors text-sm"><i data-lucide="building-2" class="w-4 h-4"></i> GOR / Venue</a>
            <a href="users.html"      class="superadmin-only flex items-center gap-3 px-4 py-3 rounded hover:bg-dark-border text-gray-400 hover:text-white transition-colors text-sm"><i data-lucide="users" class="w-4 h-4"></i> Akun Pengguna</a>
        </nav>
        <div class="p-4 border-t border-dark-border shrink-0">
            <button id="logoutBtn" class="flex items-center gap-3 px-4 py-3 rounded w-full hover:bg-red-900/20 text-red-400 transition-colors text-sm"><i data-lucide="log-out" class="w-4 h-4"></i> Keluar</button>
        </div>
    </aside>

    <main class="flex-1 md:ml-64">
        <header class="h-20 bg-dark border-b border-dark-border flex items-center justify-between px-8 sticky top-0 z-30">
            <div>
                <h1 class="text-lg font-semibold">Semua Booking</h1>
                <p class="text-xs text-gray-500">Kelola semua pemesanan lapangan</p>
            </div>
            <!-- Filter Status -->
            <div class="flex gap-2 flex-wrap">
                <button onclick="filterByStatus('')"      class="filter-btn active px-3 py-1.5 rounded text-xs font-bold uppercase tracking-widest border border-dark-border bg-brand text-black" data-val="">Semua</button>
                <button onclick="filterByStatus('pending')"    class="filter-btn px-3 py-1.5 rounded text-xs font-bold uppercase tracking-widest border border-dark-border text-gray-400 hover:text-white" data-val="pending">Pending</button>
                <button onclick="filterByStatus('confirmed')"  class="filter-btn px-3 py-1.5 rounded text-xs font-bold uppercase tracking-widest border border-dark-border text-gray-400 hover:text-white" data-val="confirmed">Confirmed</button>
                <button onclick="filterByStatus('cancelled')"  class="filter-btn px-3 py-1.5 rounded text-xs font-bold uppercase tracking-widest border border-dark-border text-gray-400 hover:text-white" data-val="cancelled">Cancelled</button>
            </div>
        </header>

        <div class="p-6">
            <!-- Loading -->
            <div id="loadingState" class="flex justify-center py-20">
                <div class="w-10 h-10 border-4 border-dark-border border-t-brand rounded-full animate-spin"></div>
            </div>

            <!-- Table -->
            <div id="tableWrapper" class="hidden overflow-x-auto rounded-xl border border-dark-border">
                <table class="w-full border-collapse">
                    <thead class="border-b border-dark-border">
                        <tr>
                        <th class="px-6 py-4 text-left">Customer</th>
                            <th class="px-6 py-4 text-left">Lapangan</th>
                            <th class="px-6 py-4 text-left">Tanggal</th>
                            <th class="px-6 py-4 text-left">Jam</th>
                            <th class="px-6 py-4 text-left">Total</th>
                            <th class="px-6 py-4 text-left">Status</th>
                            <th class="px-6 py-4 text-left">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody">
                    </tbody>
                </table>
            </div>

            <div id="emptyState" class="hidden text-center py-20 text-gray-500">Tidak ada booking ditemukan.</div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        if (typeof lucide !== 'undefined') { lucide.createIcons(); }
        auth.requireRole(['admin', 'super_admin']);
        document.getElementById('logoutBtn').addEventListener('click', () => auth.logout());

        if (!auth.isSuperAdmin()) {
            document.querySelectorAll('.superadmin-only').forEach(el => el.remove());
        }

        const formatRp = n => 'Rp ' + Number(n).toLocaleString('id-ID');
        let allBookings = [];

        async function loadBookings() {
            try {
                allBookings = await api.get('/bookings');
                renderBookings(allBookings);
            } catch (e) { alert(e.message); }
        }

        function renderBookings(list) {
            const body = document.getElementById('bookingsTableBody');
            const loading = document.getElementById('loadingState');
            const wrapper = document.getElementById('tableWrapper');
            const empty = document.getElementById('emptyState');
            loading.classList.add('hidden');

            if (!list.length) { empty.classList.remove('hidden'); wrapper.classList.add('hidden'); return; }
            empty.classList.add('hidden'); wrapper.classList.remove('hidden');

            body.innerHTML = list.map(b => {
                let actionHtml = '<span class="text-gray-600 text-xs">—</span>';
                if (b.status === 'pending') {
                    actionHtml = `<button onclick="confirmBooking('${b.id}')" class="text-xs px-3 py-1.5 bg-brand text-black rounded font-bold hover:bg-white transition-colors">Konfirmasi</button>`;
                } else if (b.status === 'confirmed') {
                    actionHtml = `<button onclick="completeBooking('${b.id}')" class="text-xs px-3 py-1.5 border border-blue-500 text-blue-400 rounded font-bold hover:bg-blue-900/20 transition-colors">Selesai</button>`;
                }
                return `
                <tr class="border-b border-dark-border">
                    <td class="px-6 py-4 text-sm text-gray-300">${b.user?.name || '-'}</td>
                    <td class="px-6 py-4 text-sm font-medium text-white">${b.court?.name || '-'}</td>
                    <td class="px-6 py-4 text-sm text-gray-300">${b.booking_date}</td>
                    <td class="px-6 py-4 text-sm text-gray-300">${(b.start_time||'').substring(0,5)} – ${(b.end_time||'').substring(0,5)}</td>
                    <td class="px-6 py-4 text-sm font-semibold text-white">${formatRp(b.total_price)}</td>
                    <td class="px-6 py-4"><span class="badge-${b.status} px-2 py-1 rounded text-[10px] uppercase font-bold tracking-widest">${b.status}</span></td>
                    <td class="px-6 py-4">${actionHtml}</td>
                </tr>`;
            }).join('');
        }

        window.filterByStatus = function(status) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isActive = btn.dataset.val === status;
                btn.className = btn.className.replace(/ bg-brand text-black| text-gray-400/g, '');
                btn.classList.add(isActive ? 'bg-brand' : 'text-gray-400');
                btn.classList.toggle('text-black', isActive);
            });
            const filtered = status ? allBookings.filter(b => b.status === status) : allBookings;
            renderBookings(filtered);
        };

        loadBookings();

        window.confirmBooking = async function(id) {
            if (!confirm('Konfirmasi booking ini?')) return;
            try { await api.put(`/bookings/${id}/confirm`, {}); loadBookings(); }
            catch(e) { alert(e.message); }
        };

        window.completeBooking = async function(id) {
            if (!confirm('Tandai booking ini sebagai selesai?')) return;
            try { await api.put(`/bookings/${id}/complete`, {}); loadBookings(); }
            catch(e) { alert(e.message); }
        };
    </script>
</body>
</html>
