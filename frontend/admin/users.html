<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Akun Pengguna | JogjaCourt Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#D4AF37' },
                        gold: { DEFAULT: '#FFC800' },
                        dark: { DEFAULT: '#0A0A0A', surface: '#151515', border: '#2a2a2a' }
                    },
                    fontFamily: { sans: ['Inter','sans-serif'], display: ['Bebas Neue','cursive'] }
                }
            }
        }
    </script>
    <style>
        body { background-color:#0A0A0A; color:white; }
        th { color:#6b7280; font-size:.7rem; text-transform:uppercase; letter-spacing:.1em; font-weight:700; }
        tr:hover td { background:#1a1a1a; }
        /* Gold theme for Super Admin */
        body.superadmin-mode aside { background: linear-gradient(180deg, #100e00 0%, #151515 100%); border-right-color: rgba(255,200,0,.15); }
        body.superadmin-mode .sidebar-link.active { background: rgba(255,200,0,.12); color: #FFC800; }
        body.superadmin-mode .sidebar-link:hover { background: rgba(255,200,0,.07); color: #FFC800; }
        .sidebar-link { display:flex; align-items:center; gap:10px; padding:10px 16px; border-radius:10px; font-size:14px; color:#9ca3af; transition:all .2s; }
        .sidebar-link:hover { background:rgba(255,255,255,.05); color:white; }
        .sidebar-link.active { background:rgba(212,175,55,.1); color:#D4AF37; font-weight:600; }
        .role-badge-superadmin { display:inline-flex; align-items:center; gap:4px; background:rgba(255,200,0,.15); border:1px solid rgba(255,200,0,.3); color:#FFC800; font-size:9px; font-weight:800; letter-spacing:.12em; padding:3px 8px; border-radius:99px; }
        .role-badge-admin { display:inline-flex; align-items:center; gap:4px; background:rgba(212,175,55,.08); border:1px solid rgba(212,175,55,.2); color:#D4AF37; font-size:9px; font-weight:800; letter-spacing:.12em; padding:3px 8px; border-radius:99px; }
        /* Toggle switch */
        .toggle { position:relative; display:inline-block; width:44px; height:24px; }
        .toggle input { opacity:0; width:0; height:0; }
        .toggle-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#2a2a2a; border-radius:99px; transition:.3s; }
        .toggle-slider:before { position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.3s; }
        input:checked + .toggle-slider { background:#D4AF37; }
        input:checked + .toggle-slider:before { transform:translateX(20px); background:#000; }
        input:disabled + .toggle-slider { opacity:.4; cursor:not-allowed; }
        .search-input { background:rgba(255,255,255,.04); border:1px solid #2a2a2a; color:white; transition:all .3s; }
        .search-input:focus { border-color:#FFC800; outline:none; box-shadow:0 0 0 3px rgba(255,200,0,.08); }
    </style>
</head>
<body class="min-h-screen font-sans flex">

    <!-- Sidebar -->
    <aside class="w-64 fixed h-full bg-dark-surface border-r border-dark-border z-40 hidden md:flex flex-col"></aside>

    <main class="flex-1 md:ml-64">
        <header id="adminTopbar" class="h-16 sticky top-0 z-30 px-4 md:px-8 border-b border-dark-border" style="background:rgba(10,10,10,.97);backdrop-filter:blur(12px);">
            <div class="hidden md:flex items-center justify-between h-full w-full">
                <div>
                    <h1 class="text-base font-semibold">Kelola Akun Pengguna</h1>
                    <p class="text-xs text-gray-500">Aktifkan atau nonaktifkan akun customer &amp; admin</p>
                </div>
                <div class="flex items-center gap-4">
                    <div id="notifBellWrapDesktop" class="relative">
                        <button class="notif-toggle-btn p-2 rounded-lg hover:bg-white/5 transition-colors relative" onclick="if(typeof Notifications !== 'undefined') Notifications.toggleDropdown(event)">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-gray-400 hover:text-white transition-colors" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                            <span class="notif-badge">0</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="p-6 md:p-8 space-y-6">

            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-dark-surface border border-dark-border rounded-2xl p-5">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Total Pengguna</p>
                    <p id="statTotal" class="text-3xl font-display tracking-wider text-white">—</p>
                </div>
                <div class="bg-dark-surface border border-dark-border rounded-2xl p-5">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Customer</p>
                    <p id="statCustomer" class="text-3xl font-display tracking-wider text-brand">—</p>
                </div>
                <div class="bg-dark-surface border border-dark-border rounded-2xl p-5">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Admin</p>
                    <p id="statAdmin" class="text-3xl font-display tracking-wider text-yellow-400">—</p>
                </div>
                <div class="bg-dark-surface border border-dark-border rounded-2xl p-5">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Dinonaktifkan</p>
                    <p id="statBanned" class="text-3xl font-display tracking-wider text-red-400">—</p>
                </div>
            </div>

            <!-- Filter & Search -->
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="searchInput" placeholder="Cari nama atau email..." class="search-input flex-1 px-4 py-2.5 rounded-xl text-sm">
                <select id="filterRole" class="search-input px-4 py-2.5 rounded-xl text-sm">
                    <option value="">Semua Role</option>
                    <option value="customer">Customer</option>
                    <option value="admin">Admin</option>
                    <option value="super_admin">Super Admin</option>
                </select>
                <select id="filterStatus" class="search-input px-4 py-2.5 rounded-xl text-sm">
                    <option value="">Semua Status</option>
                    <option value="active">Aktif</option>
                    <option value="banned">Dinonaktifkan</option>
                </select>
            </div>

            <!-- Table -->
            <div id="loadingState" class="flex justify-center py-16"><div class="w-8 h-8 border-4 border-dark-border border-t-yellow-400 rounded-full animate-spin"></div></div>
            <div id="emptyState" class="hidden text-center py-16 text-gray-600">
                <i data-lucide="users" class="w-12 h-12 mx-auto mb-3"></i>
                <p>Tidak ada pengguna yang cocok dengan filter.</p>
            </div>
            <div id="tableWrapper" class="hidden overflow-x-auto rounded-2xl border border-dark-border">
                <table class="w-full border-collapse">
                    <thead class="border-b border-dark-border bg-dark-surface">
                        <tr>
                            <th class="px-6 py-4 text-left">Pengguna</th>
                            <th class="px-6 py-4 text-left">Email</th>
                            <th class="px-6 py-4 text-left">No. HP</th>
                            <th class="px-6 py-4 text-left">Peran</th>
                            <th class="px-6 py-4 text-left">Status Akun</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script>
        AdminSidebar.init('users');
        const user = auth.getUser() || {};

        const ROLE_LABELS = {
            customer: { label: 'Customer', cls: 'bg-blue-900/30 text-blue-400 border border-blue-800' },
            admin: { label: 'Admin', cls: 'bg-yellow-900/30 text-yellow-400 border border-yellow-800' },
            super_admin: { label: 'Super Admin', cls: 'bg-amber-900/30 text-amber-400 border border-amber-700' },
        };

        let allUsers = [];

        async function loadUsers() {
            try {
                allUsers = await api.get('/users');
                updateStats(allUsers);
                renderTable(allUsers);
            } catch (e) {
                document.getElementById('loadingState').innerHTML =
                    `<p class="text-red-400 text-sm">Gagal memuat: ${e.message}</p>`;
            }
        }

        function updateStats(users) {
            document.getElementById('statTotal').textContent = users.length;
            document.getElementById('statCustomer').textContent = users.filter(u => u.role === 'customer').length;
            document.getElementById('statAdmin').textContent = users.filter(u => u.role === 'admin' || u.role === 'super_admin').length;
            document.getElementById('statBanned').textContent = users.filter(u => !u.is_active).length;
        }

        function renderTable(users) {
            document.getElementById('loadingState').classList.add('hidden');
            const tbody = document.getElementById('tableBody');
            if (users.length === 0) {
                document.getElementById('tableWrapper').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('tableWrapper').classList.remove('hidden');
            const currentUserId = user.id; // Can't ban yourself
            tbody.innerHTML = users.map(u => {
                const isSelf = u.id === currentUserId;
                const isSA = u.role === 'super_admin';
                const roleInfo = ROLE_LABELS[u.role] || { label: u.role, cls: 'text-gray-400' };
                const initials = u.name.charAt(0).toUpperCase();
                const avatarColor = u.role === 'super_admin' ? 'background:rgba(255,200,0,.15);color:#FFC800;' :
                                    u.role === 'admin' ? 'background:rgba(255,196,0,.1);color:#FBBF24;' :
                                    'background:rgba(212,175,55,.1);color:#D4AF37;';
                return `
                    <tr class="border-b border-dark-border ${!u.is_active ? 'opacity-50' : ''}">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold shrink-0" style="${avatarColor}">${initials}</div>
                                <div>
                                    <p class="font-medium text-white text-sm">${u.name}</p>
                                    ${!u.is_active ? '<p class="text-xs text-red-400 font-semibold">⛔ Dinonaktifkan</p>' : ''}
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-400">${u.email}</td>
                        <td class="px-6 py-4 text-sm text-gray-400">${u.phone || '—'}</td>
                        <td class="px-6 py-4">
                            ${(isSA && !isSelf) || isSelf ? 
                                `<span class="text-xs font-bold px-2.5 py-1 rounded-full ${roleInfo.cls}">${roleInfo.label}</span>`
                                :
                                `<select class="bg-dark-surface border border-dark-border text-sm rounded px-2 py-1 text-white focus:outline-none focus:border-brand" onchange="changeRole('${u.id}', this.value, this)">
                                    <option value="customer" ${u.role === 'customer' ? 'selected' : ''}>Customer</option>
                                    <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                                </select>`
                            }
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <label class="toggle" title="${isSA || isSelf ? 'Tidak dapat diubah' : (u.is_active ? 'Klik untuk nonaktifkan' : 'Klik untuk aktifkan')}">
                                    <input type="checkbox" ${u.is_active ? 'checked' : ''} ${isSA || isSelf ? 'disabled' : ''}
                                        onchange="toggleUser('${u.id}', this.checked, this)">
                                    <span class="toggle-slider"></span>
                                </label>
                                <span class="text-xs ${u.is_active ? 'text-brand' : 'text-red-400'} font-semibold">
                                    ${u.is_active ? 'Aktif' : 'Nonaktif'}
                                </span>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.toggleUser = async function(userId, newStatus, checkbox) {
            const actionText = newStatus ? 'mengaktifkan kembali' : 'menonaktifkan';
            if (!confirm(`Yakin ingin ${actionText} akun pengguna ini?`)) {
                checkbox.checked = !newStatus; return;
            }
            checkbox.disabled = true;
            try {
                await api.put(`/users/${userId}/status`, { is_active: newStatus });
                await loadUsers();
            } catch (e) {
                alert('Gagal: ' + e.message);
                checkbox.checked = !newStatus;
                checkbox.disabled = false;
            }
        };

        window.changeRole = async function(userId, newRole, selectEl) {
            const originalRole = selectEl.querySelector('option[selected]')?.value || 'customer';
            if (!confirm(`Ubah peran pengguna ini menjadi ${newRole.toUpperCase()}?`)) {
                selectEl.value = originalRole;
                return;
            }
            selectEl.disabled = true;
            try {
                await api.put(`/users/${userId}/role`, { role: newRole });
                await loadUsers();
            } catch (e) {
                alert('Gagal mengubah peran: ' + e.message);
                selectEl.value = originalRole;
                selectEl.disabled = false;
            }
        };

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const role   = document.getElementById('filterRole').value;
            const status = document.getElementById('filterStatus').value;
            const filtered = allUsers.filter(u => {
                const matchSearch = !search || u.name.toLowerCase().includes(search) || u.email.toLowerCase().includes(search);
                const matchRole   = !role || u.role === role;
                const matchStatus = !status || (status === 'active' ? u.is_active : !u.is_active);
                return matchSearch && matchRole && matchStatus;
            });
            renderTable(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('filterRole').addEventListener('change', applyFilters);
        document.getElementById('filterStatus').addEventListener('change', applyFilters);

        loadUsers();
    </script>
</body>
</html>
