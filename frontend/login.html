<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk | JogjaCourt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#D4AF37' },
                        dark: { DEFAULT: '#080808', surface: '#111111', card: '#191919', border: '#2a2a2a' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Bebas Neue', 'cursive'] }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.85)), url('bg-badminton.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .form-input {
            background: rgba(255,255,255,0.04);
            border: 1px solid #2a2a2a;
            color: white;
            transition: all 0.3s;
        }
        .form-input:focus { border-color: #D4AF37; outline: none; box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }
        .form-input::placeholder { color: #555; }
        .shimmer-btn {
            background: linear-gradient(90deg, #D4AF37 0%, #ffffff 50%, #D4AF37 100%);
            background-size: 200%;
            transition: all 0.3s;
        }
        .shimmer-btn:hover { background-position: right center; }
        /* Autofill dark mode fix */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #111111 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
            border: 1px solid #2a2a2a;
        }
        input:-webkit-autofill:focus {
            border-color: #D4AF37 !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-12 sm:py-20 selection:bg-brand selection:text-black">

    <!-- Background orbs -->
    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-brand/5 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="inline-flex items-center justify-center gap-3 mb-2">
                <img src="logo.png" alt="JogjaCourt Logo" class="h-14 sm:h-16 w-auto object-contain transition-transform hover:scale-105" style="filter: brightness(1.1) contrast(1.4) drop-shadow(0 0 10px rgba(212,175,55,0.3));">
                <h1 class="font-display text-4xl sm:text-5xl tracking-widest text-white mt-1">JOGJA<span class="text-brand">COURT</span></h1>
            </div>
            <p class="text-gray-500 text-sm">Masuk ke akun Anda untuk melanjutkan.</p>
        </div>

        <!-- Card -->
        <div class="bg-dark-surface border border-dark-border rounded-2xl p-8 shadow-2xl">
            <h1 class="text-xl font-bold text-white mb-6">Selamat Datang Kembali</h1>

            <!-- Error / Success -->
            <div id="errorMsg" class="hidden bg-red-900/30 border border-red-500/40 text-red-400 p-3 rounded-lg text-sm mb-5 flex items-center gap-2">
                <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                <span id="errorText">-</span>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Email</label>
                    <input type="email" id="email" required placeholder="email@contoh.com"
                        class="form-input w-full px-4 py-3 rounded-xl text-sm">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest">Password</label>
                    </div>
                    <div class="relative">
                        <input type="password" id="password" required placeholder="••••••••"
                            class="form-input w-full px-4 py-3 rounded-xl text-sm pr-12">
                        <button type="button" id="togglePassword" class="absolute right-4 top-3.5 text-gray-500 hover:text-gray-300">
                            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submitBtn"
                    class="shimmer-btn w-full text-black py-3.5 rounded-xl font-bold uppercase tracking-wider text-sm mt-2">
                    Masuk ke Akun
                </button>
            </form>

        </div>

        <!-- Footer Link -->
        <p class="text-center text-sm text-gray-500 mt-6">
            Belum punya akun?
            <a href="register.html" class="text-brand font-semibold hover:underline">Daftar gratis →</a>
        </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errEl = document.getElementById('errorMsg');
            const errText = document.getElementById('errorText');
            
            btn.textContent = 'Memproses...';
            btn.disabled = true;
            errEl.classList.add('hidden');

            try {
                const user = await auth.login(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );

                // Redirect based on role
                if (user.role === 'admin' || user.role === 'super_admin') {
                    window.location.href = 'admin/dashboard.html';
                } else {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                errText.textContent = error.message || 'Email atau password salah.';
                errEl.classList.remove('hidden');
                btn.textContent = 'Masuk ke Akun';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
