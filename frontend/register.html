<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun | JogjaCourt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#D4AF37' },
                        dark: { DEFAULT: '#0A0A0A', surface: '#151515', border: '#333333' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Bebas Neue', 'cursive'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.85)), url('bg-badminton.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .form-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            color: white;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            border-color: #D4AF37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            outline: none;
        }
        /* Autofill dark mode fix */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #151515 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
            border: 1px solid #333;
        }
        input:-webkit-autofill:focus {
            border-color: #D4AF37 !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-12 sm:py-20 selection:bg-brand selection:text-black relative">
    
    <div class="absolute top-0 left-0 w-full h-full z-0 overflow-hidden opacity-30 pointer-events-none">
        <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-brand blur-[120px]"></div>
    </div>

    <div class="w-full max-w-md bg-dark-surface p-8 sm:p-12 rounded-2xl border border-dark-border shadow-2xl relative z-10">
        
        <div class="text-center mb-10 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="inline-flex items-center justify-center gap-3 mb-2">
                <img src="logo.png" alt="JogjaCourt Logo" class="h-14 sm:h-16 w-auto object-contain transition-transform hover:scale-105" style="filter: brightness(1.1) contrast(1.4) drop-shadow(0 0 10px rgba(212,175,55,0.3));">
                <h1 class="font-display text-4xl sm:text-5xl tracking-widest text-white mt-1">JOGJA<span class="text-brand">COURT</span></h1>
            </div>
            <p class="text-gray-400 text-sm mt-2 font-light">Buat akun untuk mulai bertanding.</p>
        </div>

        <form id="registerForm" class="space-y-6">
            <div id="errorMsg" class="hidden bg-red-900/30 border border-red-500/50 text-red-400 p-3 rounded text-sm text-center"></div>
            <div id="successMsg" class="hidden bg-green-900/30 border border-brand/50 text-brand p-3 rounded text-sm text-center"></div>
            
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Nama Lengkap *</label>
                <div class="relative">
                    <input type="text" id="name" required class="form-input w-full px-4 py-3 rounded-md" placeholder="Nama Anda">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Email *</label>
                <div class="relative">
                    <input type="email" id="email" required class="form-input w-full px-4 py-3 rounded-md" placeholder="email@contoh.com">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">No. Telepon (opsional)</label>
                <div class="relative">
                    <input type="text" id="phone" class="form-input w-full px-4 py-3 rounded-md" placeholder="08xxxxxxxxxx">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Kata Sandi *</label>
                <div class="relative">
                    <input type="password" id="password" required class="form-input w-full px-4 py-3 rounded-md" placeholder="••••••••" minlength="6">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-brand text-black font-bold uppercase tracking-widest py-3.5 rounded-md hover:bg-white transition-all duration-300 transform hover:-translate-y-0.5 shadow-[0_0_15px_rgba(212,175,55,0.3)] hover:shadow-[0_0_25px_rgba(212,175,55,0.5)]">
                Daftar Sekarang <span class="ml-2">→</span>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-dark-border pt-6">
            <p class="text-sm text-gray-400 mt-4">
                Sudah memiliki akses? <a href="login.html" class="text-brand font-semibold hover:underline">Masuk di sini</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            
            btn.innerHTML = 'Memproses...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');
            
            try {
                // Memanggil register API dari auth.js
                await api.post('/auth/register', {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value || null,
                    password: document.getElementById('password').value
                });
                
                successMsg.textContent = 'Registrasi berhasil! Mengarahkan ke halaman login...';
                successMsg.classList.remove('hidden');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                errorMsg.textContent = error.message || 'Terjadi kesalahan saat pendaftaran';
                errorMsg.classList.remove('hidden');
                btn.innerHTML = 'Daftar Sekarang <span class="ml-2">→</span>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
