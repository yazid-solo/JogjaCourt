<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar GOR | ArenaBooking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { DEFAULT: '#AAFF00' },
                        dark: { DEFAULT: '#080808', surface: '#111111', card: '#191919', border: '#2a2a2a' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Bebas Neue', 'cursive'] }
                }
            }
        }
    </script>
    <style>
        body { background: #080808; color: white; }
        .venue-card {
            background: #111;
            border: 1px solid #2a2a2a;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .venue-card:hover { border-color: rgba(170,255,0,0.5); transform: translateY(-6px); box-shadow: 0 20px 40px rgba(170,255,0,0.08); }
        .venue-card:hover .venue-img { transform: scale(1.08); }
        .venue-img { transition: transform 0.7s ease; }
        .img-overlay { background: linear-gradient(to top, #111 0%, rgba(17,17,17,0.4) 60%, transparent 100%); }
        .skeleton { background: linear-gradient(90deg, #181818 25%, #222 50%, #181818 75%); background-size: 200%; animation: skeleton 1.5s infinite; border-radius: 16px; }
        @keyframes skeleton { to { background-position: -200% center; } }
    </style>
</head>
<body class="min-h-screen font-sans selection:bg-brand selection:text-black">

    <!-- Navbar -->
    <nav class="fixed w-full z-50" style="background: rgba(8,8,8,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid #2a2a2a;">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-8 h-8 bg-brand rounded-lg flex items-center justify-center">
                    <i data-lucide="activity" class="text-black w-4 h-4"></i>
                </div>
                <span class="font-display text-2xl tracking-wider hidden sm:block">ARENA<span class="text-brand">BOOKING</span></span>
            </div>
            <!-- Breadcrumb -->
            <div class="flex items-center gap-2 text-sm text-gray-500">
                <a href="locations.html" class="hover:text-brand transition-colors flex items-center gap-1">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    <span id="areaNameBreadcrumb" class="hidden sm:block">Daerah</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="pt-28 pb-10 relative">
        <div class="absolute top-0 right-0 w-80 h-80 bg-brand/3 rounded-full blur-[100px] pointer-events-none"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <!-- Breadcrumb trail -->
            <div class="flex items-center gap-2 text-xs text-gray-600 mb-4">
                <a href="locations.html" class="hover:text-brand transition-colors">Daerah</a>
                <i data-lucide="chevron-right" class="w-3 h-3"></i>
                <span class="text-brand font-bold" id="areaNameCrumb">...</span>
            </div>
            <span class="text-brand text-xs font-bold uppercase tracking-widest">Langkah 2 dari 3</span>
            <h1 class="text-4xl md:text-6xl font-display tracking-widest uppercase mt-2 mb-2">Pilih <span class="text-brand">GOR</span></h1>
            <p class="text-gray-500 text-sm">Semua GOR aktif di <span id="areaNameSub" class="text-white">daerah ini</span>.</p>
        </div>
    </div>

    <!-- Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
        <!-- Loading Skeletons -->
        <div id="loadingState" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="skeleton h-80"></div>
            <div class="skeleton h-80"></div>
            <div class="skeleton h-80"></div>
        </div>

        <!-- Venues Grid -->
        <div id="venuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-24">
            <div class="w-20 h-20 bg-dark-card border border-dark-border rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="building-x" class="w-8 h-8 text-gray-600"></i>
            </div>
            <h3 class="text-lg font-semibold text-gray-400 mb-2">Belum ada GOR di daerah ini</h3>
            <a href="locations.html" class="inline-block mt-4 text-brand text-sm hover:underline">← Pilih daerah lain</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (typeof lucide !== 'undefined') { lucide.createIcons(); }

        const urlParams = new URLSearchParams(window.location.search);
        const areaId = urlParams.get('area_id');
        const areaName = urlParams.get('area_name') || 'Daerah';

        if (!areaId) window.location.href = 'locations.html';

        // Set all area name references
        document.getElementById('areaNameBreadcrumb').textContent = areaName;
        document.getElementById('areaNameCrumb').textContent = areaName;
        document.getElementById('areaNameSub').textContent = areaName;
        document.title = `GOR di ${areaName} | ArenaBooking`;

        const VENUE_IMAGES = [
            'https://images.unsplash.com/photo-1599839619722-39751411ea63?auto=format&fit=crop&w=700&q=80',
            'https://images.unsplash.com/photo-1626224583764-f87db24ac4ea?auto=format&fit=crop&w=700&q=80',
            'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?auto=format&fit=crop&w=700&q=80',
        ];

        async function loadVenues() {
            try {
                const venues = await api.get(`/areas/${areaId}/venues`);
                renderVenues(venues);
            } catch (error) {
                document.getElementById('loadingState').innerHTML =
                    `<div class="col-span-3 text-center py-20"><p class="text-red-400 text-sm">Gagal memuat: ${error.message}</p><button onclick="loadVenues()" class="mt-3 text-brand text-sm hover:underline">Coba Lagi</button></div>`;
            }
        }

        function renderVenues(venues) {
            document.getElementById('loadingState').classList.add('hidden');
            const grid = document.getElementById('venuesGrid');
            const empty = document.getElementById('emptyState');

            if (venues.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            grid.innerHTML = venues.map((venue, i) => {
                const img = venue.image_url || VENUE_IMAGES[i % VENUE_IMAGES.length];
                return `
                <div class="venue-card rounded-2xl overflow-hidden flex flex-col"
                     onclick="window.location.href='courts.html?venue_id=${venue.id}&venue_name=${encodeURIComponent(venue.name)}'">
                    <!-- Image -->
                    <div class="relative h-52 overflow-hidden flex-shrink-0">
                        <img src="${img}" alt="${venue.name}" class="venue-img w-full h-full object-cover">
                        <div class="img-overlay absolute inset-0"></div>
                        <div class="absolute bottom-4 left-4">
                            <span class="text-[10px] font-bold uppercase tracking-widest text-brand border border-brand/40 bg-brand/10 px-2 py-1 rounded">GOR Aktif</span>
                        </div>
                    </div>

                    <!-- Info -->
                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="text-xl font-bold text-white mb-2">${venue.name}</h3>

                        <div class="flex items-start gap-2 text-gray-500 text-sm mb-3">
                            <i data-lucide="map-pin" class="w-4 h-4 flex-shrink-0 mt-0.5 text-gray-600"></i>
                            <span class="line-clamp-2">${venue.address || 'Alamat belum tersedia'}</span>
                        </div>

                        ${venue.phone ? `<div class="flex items-center gap-2 text-gray-500 text-sm mb-3"><i data-lucide="phone" class="w-4 h-4 text-gray-600"></i><span>${venue.phone}</span></div>` : ''}

                        <p class="text-gray-600 text-sm line-clamp-2 leading-relaxed mb-5">${venue.description || ''}</p>

                        <div class="flex items-center justify-between mt-auto pt-4 border-t border-dark-border">
                            <span class="text-xs font-bold text-brand uppercase tracking-widest flex items-center gap-1">
                                Lihat Lapangan
                                <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i>
                            </span>
                            ${venue.maps_url ? `<a href="${venue.maps_url}" target="_blank" onclick="event.stopPropagation()" class="flex items-center gap-1 text-xs text-gray-500 hover:text-brand transition-colors border border-dark-border px-2.5 py-1.5 rounded-lg"><i data-lucide="navigation" class="w-3.5 h-3.5"></i> Maps</a>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');

            if (typeof lucide !== 'undefined') { lucide.createIcons(); }
        }

        loadVenues();
    </script>
</body>
</html>
